<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NimbusCore</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: #000000;
            color: #FFFFFF;
            overflow: hidden;
        }

        /* 3D Canvas Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-box {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(224, 17, 95, 0.2);
            border: 1px solid rgba(224, 17, 95, 0.2);
            max-width: 480px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-login {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
        }

        .logo-login .nimbus {
            color: #FFFFFF;
        }

        .logo-login .core {
            color: #E0115F;
        }

        .logo-icon {
            font-size: 3em;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 20px rgba(224, 17, 95, 0.5));
        }

        .login-type {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(224, 17, 95, 0.15);
            border: 1px solid rgba(224, 17, 95, 0.3);
            border-radius: 25px;
            font-size: 0.95em;
            margin-top: 15px;
            font-weight: 600;
            color: #E0115F;
        }

        .error-message {
            background: rgba(224, 17, 95, 0.1);
            border: 1px solid #E0115F;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            color: #E0115F;
            display: none;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #CCCCCC;
            font-size: 0.95em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(224, 17, 95, 0.2);
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #E0115F;
            box-shadow: 0 0 20px rgba(224, 17, 95, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #E0115F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(224, 17, 95, 0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #808080;
            text-decoration: none;
            font-size: 0.95em;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #E0115F;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Background -->
    <canvas id="canvas-bg"></canvas>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="logo-icon"></span>
                <div class="logo-login">
                    <span class="nimbus">Nimbus</span><span class="core">Core</span>
                </div>
                <span class="login-type" id="login-type">User Login</span>
            </div>

            <div class="error-message" id="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 3D Background Script -->
    <script>
        const canvas = document.getElementById('canvas-bg');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        camera.position.z = 5;

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.012,
            color: 0xE0115F,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0003;
            particlesMesh.rotation.x += 0.0001;
            particlesMesh.rotation.y += mouseX * 0.00003;
            particlesMesh.rotation.x += mouseY * 0.00003;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
