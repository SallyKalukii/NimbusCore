<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="background: #1a1a1a; padding: 40px; border-radius: 12px; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 30px;">Quick Test Login</h2>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #808080;">Email</label>
                <input type="email" id="email" placeholder="user@test.com" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #808080; border-radius: 6px; color: white;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #808080;">Password</label>
                <input type="password" id="password" placeholder="password" style="width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #808080; border-radius: 6px; color: white;">
            </div>

            <button onclick="testLogin()" style="width: 100%; padding: 12px; background: #E0115F; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em;">
                Login & Test Dashboard
            </button>

            <div id="error" style="margin-top: 15px; color: #E0115F; text-align: center;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Redirect to user dashboard
                window.location.href = 'user-dashboard.html';
            } catch (error) {
                errorDiv.textContent = 'Login failed: ' + error.message;
            }
        }
    </script>
</body>
</html>
